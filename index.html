<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Caixa — Exportar</title>
<style>
body{background:#0f0f13;color:#f1f5f9;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px}
h2{font-size:22px;text-align:center}
p{color:#94a3b8;text-align:center;max-width:340px;line-height:1.6}
button{padding:16px 32px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.exp{background:#22c55e;color:#fff}
.imp{background:#3b82f6;color:#fff}
input[type=file]{display:none}
#msg{color:#4ade80;font-weight:600;text-align:center}
</style>
</head>
<body>
<h2>💰 Meu Caixa — Backup</h2>
<p>Clique em <strong>Exportar</strong> para baixar seus dados. Depois importe no novo sistema.</p>
<button class="exp" onclick="exportar()">📤 Exportar meus dados</button>
<button class="imp" onclick="document.getElementById('fi').click()">📥 Importar backup</button>
<input type="file" id="fi" accept=".json" onchange="importar(event)">
<div id="msg"></div>
<script>
function exportar(){
  const d=localStorage.getItem('meu_caixa_v4')||'[]';
  const b=new Blob([d],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download='backup-meu-caixa.json';a.click();
  URL.revokeObjectURL(u);
  document.getElementById('msg').textContent='✅ Backup baixado com sucesso!';
}
function importar(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))return alert('Arquivo inválido!');
      localStorage.setItem('meu_caixa_v4',JSON.stringify(d));
      document.getElementById('msg').textContent='✅ '+d.length+' lançamentos importados!';
    }catch(err){alert('Erro ao ler arquivo!');}
  };
  r.readAsText(f);
}
</script>
</body>
</html>
